# ─────────────────────────────────────────────────────────────
#  Perfil LOCAL  –  base de datos H2 en memoria (desarrollo)
# ─────────────────────────────────────────────────────────────
spring.application.name=sistema-inscripcion
server.port=8080

# H2 en memoria para desarrollo local
spring.datasource.url=jdbc:h2:mem:inscripciondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2 (solo para desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring activa perfil local por defecto
spring.profiles.active=local

# ─────────────────────────────────────────────────────────────
#  OAuth2 / IdaaS - Auth0 (reemplazar con tus valores reales)
# ─────────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://TU_DOMINIO.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://api.sistema-inscripcion.com

# Auth0 settings
auth0.domain=TU_DOMINIO.auth0.com
auth0.audience=https://api.sistema-inscripcion.com

# ─────────────────────────────────────────────────────────────
#  AWS S3
# ─────────────────────────────────────────────────────────────
aws.region=us-east-1
aws.s3.bucket-name=inscripciones-resumenes-bucket
# En producción, usar IAM roles en lugar de credenciales hardcodeadas
aws.access-key=TU_ACCESS_KEY
aws.secret-key=TU_SECRET_KEY

# ─────────────────────────────────────────────────────────────
#  Springdoc / Swagger UI
# ─────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.oauth2-redirect-url=/swagger-ui/oauth2-redirect.html
