name: CI/CD – Build, Push Docker Hub y Deploy en EC2

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────
  #  JOB 1: Compilar y ejecutar tests
  # ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests y compilar
        run: mvn clean verify

      - name: Subir artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-build
          path: target/sistema-inscripcion-1.0.0.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  #  JOB 2: Construir imagen Docker y publicar en Docker Hub
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  #  JOB 3: Desplegar la imagen en EC2 (AWS)
  # ─────────────────────────────────────────────────────────────
  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: SSH al EC2 y desplegar contenedor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Detener y eliminar el contenedor anterior si existe
            docker stop sistema-inscripcion || true
            docker rm   sistema-inscripcion || true

            # Descargar la imagen más reciente
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest

            # Levantar el nuevo contenedor con variables de entorno Oracle Cloud
            docker run -d \
              --name sistema-inscripcion \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ORACLE_URL="${{ secrets.ORACLE_URL }}" \
              -e ORACLE_USER="${{ secrets.ORACLE_USER }}" \
              -e ORACLE_PASSWORD="${{ secrets.ORACLE_PASSWORD }}" \
              -v /home/${{ secrets.EC2_USER }}/wallet:/app/wallet:ro \
              ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest

            # Verificar que el contenedor arrancó correctamente
            sleep 15
            docker ps | grep sistema-inscripcion
            echo "✅ Despliegue completado exitosamente"
